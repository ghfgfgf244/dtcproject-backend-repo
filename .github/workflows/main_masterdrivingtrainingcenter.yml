name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop  # Cho phép chạy trên cả develop để check code
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'
      - name: Build & Test
        run: |
          dotnet restore
          dotnet build --configuration Release --no-restore
          dotnet test --no-build --verbosity normal

  deploy:
    # ĐÂY LÀ DÒNG QUAN TRỌNG NHẤT
    # Job này chỉ chạy nếu nhánh hiện tại là 'main'
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    needs: build # Phải build xong và pass test mới được deploy
    runs-on: windows-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        # ... các bước login Azure và deploy của bạn giữ nguyên ...
      
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'masterdrivingtrainingcenter'
          slot-name: 'Production'
          package: .